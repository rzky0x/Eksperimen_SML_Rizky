name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing pipeline
        run: |
          cd preprocessing
          python automate_Rizky.py

      - name: Verify preprocessed data
        run: |
          echo "Checking preprocessed files..."
          ls -la preprocessing/wine_quality_preprocessing/
          echo "Train data:"
          head -5 preprocessing/wine_quality_preprocessing/train.csv
          echo "Test data:"
          head -5 preprocessing/wine_quality_preprocessing/test.csv

      - name: Commit and push preprocessed data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/wine_quality_preprocessing/
          git diff --cached --quiet || git commit -m "Update preprocessed data [automated]"
          git push
